version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: cybersec-mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: cybersec-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
